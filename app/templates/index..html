<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Proyecto DevOps</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --card: #13161e;
      --accent: #00e5a0;
      --accent2: #005c40;
      --text: #e8eaf0;
      --muted: #5a6070;
      --border: #1e2230;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Grid de fondo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.5;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
      animation: fadeUp 0.8s ease both;
    }

    /* Etiqueta decorativa superior */
    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .tag::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }
    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    /* Tarjeta de equipo */
    .team-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 2rem;
    }

    .team-header {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .member {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.6s ease both;
    }
    .member:last-child { border-bottom: none; }
    .member:nth-child(1) { animation-delay: 0.1s; }
    .member:nth-child(2) { animation-delay: 0.2s; }
    .member:nth-child(3) { animation-delay: 0.3s; }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 8px;
      background: var(--accent2);
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--accent);
      flex-shrink: 0;
    }

    .member-name {
      font-size: 0.9rem;
      font-weight: 700;
    }
    .member-role {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Badge Docker */
    .badge {
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent2);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
    }
    .badge svg { width: 14px; height: 14px; fill: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tag">DevOps · Docker · 2025</div>

    <h1>Mi proyecto de <span>DevOps</span><br>desde Docker!</h1>
    <p class="subtitle">// Contenedor activo y ejecutándose correctamente</p>

    <div class="team-card">
      <div class="team-header">// Equipo de desarrollo</div>

      <div class="member">
        <div class="avatar">AM</div>
        <div>
          <div class="member-name">Alejandro Muñoz</div>
          <div class="member-role">DevOps Engineer</div>
        </div>
      </div>

      <div class="member">
        <div class="avatar">JL</div>
        <div>
          <div class="member-name">José López</div>
          <div class="member-role">DevOps Engineer</div>
        </div>
      </div>

      <div class="member">
        <div class="avatar">JM</div>
        <div>
          <div class="member-name">Juan Murguía</div>
          <div class="member-role">DevOps Engineer</div>
        </div>
      </div>
    </div>

    <div class="badge">

      </svg>
      Corriendo en Docker
    </div>
  </div>
</body>
</html>
